<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HaloGuard - AI Hallucination Detector</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="popup-container">
    <!-- Status Bar -->
    <div class="status-bar" id="status-bar">
      <div class="status-left">
        <div class="logo">🛡️</div>
        <div class="brand">HALOGUARD</div>
      </div>
      <div class="status-center">
        <span class="status-badge active">🟢 REAL-TIME MONITORING: ACTIVE</span>
      </div>
      <div class="status-right">
        <div class="metric">
          <span class="label">Threats</span>
          <span class="value">0</span>
        </div>
        <div class="metric">
          <span class="label">Exposure</span>
          <span class="value">0</span>
        </div>
        <div class="metric">
          <span class="label">Traffic</span>
          <span class="value">0 MB</span>
        </div>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content" id="main-content">
      <div class="dashboard-content">
        <div class="live-insights">
          <h3>📊 LIVE INSIGHTS</h3>
          <p class="empty">Loading...</p>
        </div>
        <div class="recent-activity">
          <h3>📋 RECENT ACTIVITY</h3>
          <p class="empty">Loading...</p>
        </div>
        <div class="quick-actions">
          <button id="scan-btn" class="action-btn primary">🔍 Scan Current Page</button>
          <button id="clear-btn" class="action-btn secondary">🗑️ Clear History</button>
          <button id="refresh-btn" class="action-btn secondary">↻ Refresh</button>
        </div>
      </div>

      <div id="reports-content" style="display: none"></div>
      <div id="settings-content" style="display: none"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <button class="nav-tab active" data-tab="dashboard">📊 Dashboard</button>
      <button class="nav-tab" data-tab="reports">📈 Reports</button>
      <button class="nav-tab" data-tab="settings">⚙️ Settings</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
