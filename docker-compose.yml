version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: haloguard
      POSTGRES_PASSWORD: haloguard_dev
      POSTGRES_DB: haloguard_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haloguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python NLI Service
  nli-service:
    build:
      context: .
      dockerfile: Dockerfile.python
    environment:
      NLI_MODEL_ID: microsoft/deberta-v3-small
      DEVICE: cpu
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    environment:
      NODE_ENV: development
      PORT: 3000
      REDIS_URL: redis://redis:6379/0
      NLI_SERVICE_URL: http://nli-service:8000
    ports:
      - "3000:3000"
      - "9229:9229"
    volumes:
      - ./shared-core:/app/shared-core
      - ./shared-client-sdk:/app/shared-client-sdk
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      nli-service:
        condition: service_healthy
    command: npm run dev:backend

  # Python ML Worker
  ml-worker:
    build:
      context: .
      dockerfile: Dockerfile.python
    environment:
      REDIS_URL: redis://redis:6379/0
      NLI_MODEL_ID: microsoft/deberta-v3-small
      EMBEDDINGS_MODEL_ID: sentence-transformers/all-MiniLM-L6-v2
    ports:
      - "8000:8000"
    volumes:
      - ./python-workers:/app
      - ml-cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  ml-cache:

networks:
  default:
    name: haloguard_network
